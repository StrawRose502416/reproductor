<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Dropbox</title>
    
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="player-container">
        <!-- Contenedor del video -->
        <div class="video-wrapper">
            <video id="videoPlayer" class="video-player" poster="https://via.placeholder.com/1280x720/1a1a1a/667eea?text=Reproductor+Dropbox">
                <!-- Las fuentes se cargarán dinámicamente -->
            </video>
            
            <!-- Overlay de carga -->
            <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                <div class="spinner"></div>
                <p>Cargando video desde Dropbox...</p>
            </div>
            
            <!-- Mensaje de error -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorText"></p>
                <button onclick="location.reload()" class="retry-btn">
                    <i class="fas fa-redo"></i> Reintentar
                </button>
            </div>
        </div>
        
        <!-- Controles del reproductor -->
        <div class="player-controls">
            <!-- Barra de progreso -->
            <div class="progress-bar-container" id="progressBar">
                <div class="progress-bar" id="progress"></div>
                <div class="progress-buffer" id="buffer"></div>
            </div>
            
            <!-- Botones de control -->
            <div class="controls-main">
                <div class="controls-left">
                    <button id="playPauseBtn" class="control-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span>/</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
                
                <div class="controls-right">
                    <button id="volumeBtn" class="control-btn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
                    
                    <button id="fullscreenBtn" class="control-btn">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Panel de Dropbox -->
        <div class="dropbox-panel">
            <div class="dropbox-header">
                <i class="fab fa-dropbox"></i>
                <h3>Video desde Dropbox</h3>
            </div>
            
            <div class="dropbox-input-group">
                <label for="dropboxUrl">URL del video (MP4):</label>
                <div class="input-wrapper">
                    <input type="url" id="dropboxUrl" 
                           placeholder="https://www.dropbox.com/s/.../video.mp4?dl=0"
                           value="https://www.w3schools.com/html/mov_bbb.mp4">
                    <button id="loadVideoBtn" class="load-btn">
                        <i class="fas fa-cloud-download-alt"></i>
                        Cargar
                    </button>
                </div>
                <p class="help-text">
                    <i class="fas fa-info-circle"></i>
                    Pega el enlace de Dropbox y haz clic en "Cargar"
                </p>
            </div>
            
            <div class="dropbox-examples">
                <p><strong>Videos de prueba:</strong></p>
                <button class="example-link" data-url="https://www.w3schools.com/html/mov_bbb.mp4">
                    🎬 Video MP4 (W3Schools)
                </button>
                <button class="example-link" data-url="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4">
                    🐰 Big Buck Bunny (10s)
                </button>
                <button class="example-link" data-url="https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4">
                    📹 Sample Video
                </button>
            </div>
        </div>
    </div>
    
    <script src="js/player.js"></script>
</body>
</html>
